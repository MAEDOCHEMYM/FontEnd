 <!DOCTYPE html><html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Formation | Multi-Pays</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex items-center justify-center"><div class="w-full max-w-md p-6">
    <h2 class="text-2xl font-bold mb-6">Paiement Formation (Afrique)</h2><form class="space-y-4">
    <input type="text" id="client_name" placeholder="Nom complet" required class="w-full border p-3 rounded">

    <select id="formation" class="w-full border p-3 rounded">
        <option value="Bureautique" data-price="10">Bureautique (10$)</option>
        <option value="Web" data-price="15">Site Web (15$)</option>
    </select>

    <input type="tel" id="phone" placeholder="243XXXXXXXXX" required class="w-full border p-3 rounded">

    <input type="hidden" id="final_amount" value="10">
    <input type="hidden" id="op_code">

    <button type="button" id="btnPay" class="w-full bg-black text-white p-3 rounded">Payer</button>
</form>

</div><script>
const API_URL = "/api/pay.php";

// 🔥 Mapping multi-pays PawaPay
const prefixMap = {
    // RDC
    "24381": "VODACOM_MPESA_COD",
    "24382": "VODACOM_MPESA_COD",
    "24397": "AIRTEL_CD",
    "24399": "AIRTEL_CD",
    "24389": "ORANGE_CD",
    "24385": "ORANGE_CD",

    // Bénin
    "22997": "MTN_BEN",
    "22996": "MTN_BEN",
    "22995": "MOOV_BEN",

    // Sénégal
    "22177": "ORANGE_SEN",
    "22178": "ORANGE_SEN",
    "22176": "FREE_SEN",
    "22170": "FREE_SEN",

    // Côte d'Ivoire
    "22507": "ORANGE_CIV",
    "22505": "MTN_CIV",
    "22501": "MOOV_CIV",

    // Cameroun
    "23767": "MTN_CMR",
    "23769": "ORANGE_CMR",

    // Ghana
    "23324": "MTN_GHA",
    "23355": "MTN_GHA",

    // Rwanda
    "25078": "MTN_RWA",

    // Ouganda
    "25677": "MTN_UGA",

    // Zambie
    "26097": "MTN_ZMB",

    // Tanzanie
    "25574": "VODACOM_TZA",
    "25565": "TIGO_TZA"
};

const phone = document.getElementById('phone');
const opCodeInput = document.getElementById('op_code');

function detectOperator() {
    let input = phone.value.replace(/\D/g, '');

    let found = false;
    for (let prefix in prefixMap) {
        if (input.startsWith(prefix)) {
            opCodeInput.value = prefixMap[prefix];
            found = true;
            break;
        }
    }

    if (!found) opCodeInput.value = "";
}

phone.addEventListener('input', detectOperator);

// Prix dynamique
const formation = document.getElementById('formation');
formation.addEventListener('change', () => {
    const price = formation.options[formation.selectedIndex].dataset.price;
    document.getElementById('final_amount').value = price;
});

// Paiement
const btnPay = document.getElementById('btnPay');

btnPay.addEventListener('click', async () => {
    const name = document.getElementById('client_name').value.trim();
    let phoneNumber = phone.value.replace(/\D/g, '');
    const operator = opCodeInput.value;
    const amount = document.getElementById('final_amount').value;

    if (!name || !phoneNumber) {
        alert("Remplissez tous les champs");
        return;
    }

    if (!operator) {
        alert("Pays ou opérateur non supporté");
        return;
    }

    btnPay.innerText = "Traitement...";
    btnPay.disabled = true;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                client_name: name,
                phone: phoneNumber,
                amount: amount,
                operator: operator,
                formation: formation.value
            })
        });

        const result = await response.json();

        if (result.status === 'SUCCESS') {
            window.location.href = result.redirectUrl;
        } else {
            alert(result.message);
        }

    } catch (e) {
        alert("Erreur serveur");
    }

    btnPay.innerText = "Payer";
    btnPay.disabled = false;
});
</script></body>
</html>
