<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement Formation</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-bold mb-4">Paiement Formation</h2>

    <input id="client_name" type="text" placeholder="Nom complet"
        class="w-full mb-3 p-2 border rounded">

    <input id="email" type="email" placeholder="Email"
        class="w-full mb-3 p-2 border rounded">

    <input id="phone" type="text" placeholder="+243..."
        class="w-full mb-3 p-2 border rounded">

    <input id="final_amount" type="number" placeholder="Montant USD"
        class="w-full mb-3 p-2 border rounded">

    <input id="formation" type="text" placeholder="Nom de la formation"
        class="w-full mb-3 p-2 border rounded">

    <!-- Opérateur détecté -->
    <div id="badge" class="hidden bg-green-100 p-2 rounded mb-3">
        Opérateur : <span id="opLabel"></span>
    </div>

    <input type="hidden" id="op_code">

    <button id="btnPay"
        class="w-full bg-blue-600 text-white p-2 rounded">
        LANCER LE PAIEMENT
    </button>
</div>

<script>
const API_URL = "/api/pay.php";

/* Codes opérateurs Pawapay */
const prefixMap = {
    "+24381": "VODACOM_MPESA_COD",
    "+24382": "VODACOM_MPESA_COD",
    "+24383": "VODACOM_MPESA_COD",
    "+24384": "VODACOM_MPESA_COD",
    "+24397": "AIRTEL_COD",
    "+24399": "AIRTEL_COD",
    "+24389": "ORANGE_COD",
    "+24385": "ORANGE_COD",
    "+24380": "AFRICELL_COD",
    "+22997": "MTN_BEN",
    "+22996": "MTN_BEN",
    "+22995": "MOOV_BEN",
    "+22177": "ORANGE_SEN",
    "+22178": "ORANGE_SEN",
    "+22170": "FREE_SEN",
    "+22176": "EXPRESSO_SEN",
    "+22507": "ORANGE_CIV",
    "+22505": "MTN_CIV",
    "+22501": "MOOV_CIV",
    "+23767": "MTN_CMR",
    "+23769": "ORANGE_CMR"
};

const phone = document.getElementById('phone');
const badge = document.getElementById('badge');
const opLabel = document.getElementById('opLabel');
const opCodeInput = document.getElementById('op_code');
const btnPay = document.getElementById('btnPay');

/* Détection opérateur */
function detectOperator() {
    let input = phone.value.trim().replace(/\s/g, '');
    if (input.length > 2 && !input.startsWith('+')) input = '+' + input;

    let matched = false;
    for (let prefix in prefixMap) {
        if (input.startsWith(prefix)) {
            const operatorCode = prefixMap[prefix];
            opLabel.innerText = operatorCode;
            opCodeInput.value = operatorCode;
            badge.classList.remove('hidden');
            matched = true;
            break;
        }
    }

    if (!matched) {
        badge.classList.add('hidden');
        opCodeInput.value = "";
    }
}
phone.addEventListener('input', detectOperator);

/* Paiement via fetch AJAX */
btnPay.addEventListener('click', async () => {
    const name = document.getElementById('client_name').value.trim();
    const email = document.getElementById('email').value.trim();
    let phoneNumber = phone.value.trim().replace(/\s/g, '');
    if (phoneNumber && !phoneNumber.startsWith('+')) phoneNumber = '+' + phoneNumber;

    const operatorCode = opCodeInput.value;
    const amount = document.getElementById('final_amount').value;
    const formation = document.getElementById('formation').value.trim();

    if (!name || !email || !phoneNumber || !amount) {
        alert("Veuillez remplir tous les champs obligatoires.");
        return;
    }

    btnPay.innerText = "PATIENTEZ...";
    btnPay.disabled = true;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 60000);

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            signal: controller.signal,
            body: JSON.stringify({
                client_name: name,
                email: email,
                phone: phoneNumber,
                amount: amount,
                formation: formation,
                operator: operatorCode
            })
        });

        clearTimeout(timeoutId);

        const result = await response.json();

        if (result.status === 'SUCCESS') {
            window.location.href = result.redirectUrl;
        } else {
            alert("Erreur : " + (result.message || "Problème lors du paiement"));
            console.log(result.debug);
        }

    } catch (error) {
        if (error.name === 'AbortError') {
            alert("Serveur lent. Réessayez dans 10 secondes.");
        } else {
            alert("Erreur réseau.");
        }
    } finally {
        btnPay.innerText = "LANCER LE PAIEMENT";
        btnPay.disabled = false;
    }
});
</script>

</body>
</html>
